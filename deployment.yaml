apiVersion: v1
kind: Service
metadata:
  name: devops-svc
spec:
  type: NodePort
  selector:
    app: devops
  ports:
    - name: api
      targetPort: 8000
      port: 8000
      nodePort: 30005
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-devops
  labels:
    app: devops
spec:
  replicas: 5
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
        - name: api
          image: paulinhotobias/curso-devops
          #command: ["-e", "main:APP"]
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: notificacao-svc
spec:
  type: NodePort
  selector:
    app: devops
  ports:
    - name: notificacao
      targetPort: 8000
      port: 8000
      nodePort: 30006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-notificacao
  labels:
    app: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
        - name: notificacao
          image: paulinhotobias/curso-devops
          args: ["-e", "notificacao:APP_NOTIFICACAO"]
          ports:
            - containerPort: 8000